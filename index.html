<html>
    <head>
        <title>2d wave eqn</title>
    </head>
    <body>
        <canvas id='cvs'></canvas>
        <script>
            const cvs = document.getElementById('cvs');
            const ctx = cvs.getContext('2d');

            let cw = 500;
            let ch = 500;

            cvs.width = cw + 200;
            cvs.height = ch;
            cvs.style.border = '1px solid black';

            let grid = [];
            let oldGrid = [];
            let olderGrid = [];

            let C = 0.5;

            let max = 10;
            let min = 0;

            let damping = 1;

            let useMur = true;

            for (let y=0; y<ch; y++) {
                grid.push([]);
                oldGrid.push([]);
                olderGrid.push([]);
                for (let x=0; x<ch; x++) {
                    grid[y].push(0);
                    oldGrid[y].push(0);
                    olderGrid[y].push(0);
                }
            }

            let mag = 1000000

            grid[150][150] = mag;
            oldGrid[150][150] = mag;
            olderGrid[150][150] = mag;

            // grid[350][350] = mag / 2;
            // oldGrid[350][350] = mag / 2;
            // olderGrid[350][350] = mag / 2;

            // for (let x = 250; x <=250; x++) {
            //     for (let y = 250; y <= 250; y++) {
            //         grid[y][x] = mag;
            //         oldGrid[y][x] = mag;
            //         olderGrid[y][x] = mag;
            //     }
            // }

            function inGrid(x, y) {
                return x > 0 && y > 0 && x < cw-1 && y < ch-1;
            }

            function isWall(x, y) {
                return x == 250 && !((y > 125 && y < 140) || (y > 160 && y < 175));
                // return false;
            }

            let fixed = ['150-150']

            let walls = [];

            for (let y=0; y<ch; y++) {
                walls.push(`${300}-${y}`)
            }

            function updateCell(x, y) {
                grid[y][x] = (C * C * (oldGrid[y][x+1] + oldGrid[y][x-1] + oldGrid[y-1][x] + oldGrid[y+1][x] - 4 * oldGrid[y][x]) + 2 * oldGrid[y][x] - olderGrid[y][x]) * damping;

                // if (x != 250 || y != 250) {
                if (grid[y][x] > max) max = grid[y][x];
                if (grid[y][x] < min) min = grid[y][x];
                // }
            }

            function updateLeft() {
                for (let y=0; y<ch; y++) {
                    grid[y][0] = oldGrid[y][1] - (1-C)/(1+C)*(grid[y][1] - oldGrid[y][0]);
                }
            }

            function updateRight() {
                for (let y=0; y<ch; y++) {
                    grid[y][cw-1] = oldGrid[y][cw-2] - (1-C)/(1+C)*(grid[y][cw-2] - oldGrid[y][cw-1]);
                }
            }

            function updateTop() {
                for (let x=0; x<cw; x++) {
                    grid[0][x] = oldGrid[1][x] - (1-C)/(1+C)*(grid[1][x] - oldGrid[0][x]);
                }
            }

            function updateBottom() {
                for (let x=0; x<cw; x++) {
                    grid[ch-1][x] = oldGrid[ch-2][x] - (1-C)/(1+C)*(grid[ch-2][x] - oldGrid[ch-1][x]);
                }
            }

            let t = 0;
            let freq = 10;

            function frame() {
                t++;
                olderGrid = structuredClone(oldGrid);
                oldGrid = structuredClone(grid);

                max = 0;
                min = 0;

                oldGrid[150][150] = Math.round(Math.cos(t*freq/180*Math.PI) * mag);
                // console.log(Math.round(Math.cos(t*freq/180*Math.PI) * mag));
                // oldGrid[350][350] = Math.round(Math.cos(t*freq/180*Math.PI) * mag);

                for (let y=0; y<ch; y++) {
                    if (isWall(250, y)) {
                        oldGrid[y][250] = 0;
                    }
                }

                for (let x=1; x<cw-1; x++) {
                    for (let y=1; y<ch-1; y++) {
                        if (!fixed.includes(`${x}-${y}`) && !isWall(x, y)) {
                            updateCell(x, y);
                        } else {
                            if (grid[y][x] > max) max = grid[y][x];
                            if (grid[y][x] < min) min = grid[y][x];
                        }
                    }
                }

                if (useMur) {
                    updateLeft();
                    updateRight();
                    updateTop();
                    updateBottom();
                }

                render();

                // frame();
            }

            function setColor(x, mult) {
                if (x > 0) {
                    ctx.fillStyle = `rgb(${Math.round(x/mag*mult * 255)}, 0, 0)`
                } else if (x < 0) {
                    ctx.fillStyle = `rgb(0, 0, ${Math.round(-x/mag*mult * 255)})`
                } else {
                    ctx.fillStyle = 'black';
                }
            }

            let thresh = 1;

            let screen = [];
            for (let y=0; y<ch; y++) screen.push(0);

            let screenStarted = false;
            let first;
            let screenX = 480;

            function render() {
                grid.forEach((y, yi) => {
                    y.forEach((x, xi) => {
                        if (isWall(xi, yi)) {
                            ctx.fillStyle = 'green';
                        } else {
                            setColor(x, 10);
                        }

                        // if (x > thresh) ctx.fillStyle = 'red';
                        // else if (x < thresh) ctx.fillStyle = 'blue';
                        // else {ctx.fillStyle = 'black'};

                        ctx.fillRect(xi, yi, 1, 1);
                    })
                })

                if (!screenStarted && Math.abs(grid[150][screenX]) > mag/1000) {
                    screenStarted = true;
                    first = t-1;
                }

                if (screenStarted) {
                    for (let y=0; y<ch; y++) {
                        screen[y] += (Math.abs(grid[y][screenX]) - screen[y])/(t-first);

                        setColor(screen[y], 50);

                        ctx.fillRect(600, y, 10, 1);
                    }
                }
            }

            setInterval(frame, 10);

            // frame();
        </script>
    </body>
</html>

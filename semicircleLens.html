<html>
    <head>
        <title>2d wave eqn</title>
    </head>
    <body>
        <canvas id='cvs'></canvas>
        <button onmousedown="brighten = true" onmouseup="brighten = false">brighten</button>
        <button onmousedown="darken = true" onmouseup="darken = false">darken</button>
        <input type="range" min = 200 max = 400 onchange='slitX = parseInt(this.value)'>
        <script>
            const cvs = document.getElementById('cvs');
            const ctx = cvs.getContext('2d');

            let cw = 500;
            let ch = 500;

            cvs.width = cw + 200;
            cvs.height = ch;
            cvs.style.border = '1px solid black';

            let grid = [];
            let oldGrid = [];
            let olderGrid = [];

            let brighten = false;
            let darken = false;

            let C = 0.5;

            let damping = 1;

            let useMur = true;

            let showProtractor = false;

            for (let y=0; y<ch; y++) {
                grid.push([]);
                oldGrid.push([]);
                olderGrid.push([]);
                for (let x=0; x<ch; x++) {
                    grid[y].push(0);
                    oldGrid[y].push(0);
                    olderGrid[y].push(0);
                }
            }

            let mag = 1000000;

            let max = 915000;
            let min = -915000;

            let slitX = 150;

            // grid[150][150] = mag;
            // oldGrid[150][150] = mag;
            // olderGrid[150][150] = mag;

            // grid[350][350] = mag / 2;
            // oldGrid[350][350] = mag / 2;
            // olderGrid[350][350] = mag / 2;

            // for (let x = 250; x <=250; x++) {
            //     for (let y = 250; y <= 250; y++) {
            //         grid[y][x] = mag;
            //         oldGrid[y][x] = mag;
            //         olderGrid[y][x] = mag;
            //     }
            // }

            function between(v, min, max) {
                return v < max && v > min;
            }

            function inGrid(x, y) {
                return x > 0 && y > 0 && x < cw-1 && y < ch-1;
            }

            function isWall(x, y) {
                // return x == 250 && !((y > 125 && y < 140) || (y > 160 && y < 175));
                // return (x == 100 && !(between(y, 245, 255))) || (x == slitX && !(between(y, 218, 222) || between(y, 221, 225) || between(y, 228, 232) || between(y, 238, 242) || between(y, 248, 252) || between(y, 258, 262) || between(y, 268, 272) || between(y, 278, 282)));

                // return (x == slitX && !between(y, 210, 290));
                // return false;
            }

            function isUpdate(x, y) {
                return x != 0 || y < 100 || y > 400;
                // return (x + y != 100 && x + y != 101) || x < 10 || y < 10;
            }

            let fixed = [
                // '150-150'
                // '350-350'
            ]

            function getRefractiveIndex(x, y) {
                if (x < 250 && Math.hypot(x-250, y-250) <= 150) {
                    return 1.35;
                } else {
                    return 1;
                }
            }

            // let walls = [];

            // for (let y=0; y<ch; y++) {
            //     walls.push(`${300}-${y}`)
            // }

            function updateCell(x, y) {
                grid[y][x] = (C * C / ((getRefractiveIndex(x, y)) ** 2) * (oldGrid[y][x+1] + oldGrid[y][x-1] + oldGrid[y-1][x] + oldGrid[y+1][x] - 4 * oldGrid[y][x]) + 2 * oldGrid[y][x] - olderGrid[y][x]) * damping;
                

                // if (x != 250 || y != 250) {
                // if (grid[y][x] > max) max = grid[y][x];
                // if (grid[y][x] < min) min = grid[y][x];
                // }
            }

            function updateLeft() {
                for (let y=0; y<ch; y++) {
                    grid[y][0] = oldGrid[y][1] - (1-C)/(1+C)*(grid[y][1] - oldGrid[y][0]);
                }
            }

            function updateRight() {
                for (let y=0; y<ch; y++) {
                    grid[y][cw-1] = oldGrid[y][cw-2] - (1-C)/(1+C)*(grid[y][cw-2] - oldGrid[y][cw-1]);
                }
            }

            function updateTop() {
                for (let x=0; x<cw; x++) {
                    grid[0][x] = oldGrid[1][x] - (1-C)/(1+C)*(grid[1][x] - oldGrid[0][x]);
                }
            }

            function updateBottom() {
                for (let x=0; x<cw; x++) {
                    grid[ch-1][x] = oldGrid[ch-2][x] - (1-C)/(1+C)*(grid[ch-2][x] - oldGrid[ch-1][x]);
                }
            }

            let t = 0;
            let freq = 10;

            function frame() {
                t++;

                if (darken) {
                    max += 5000;
                    min -= 5000;
                }
                if (brighten) {
                    max -= 5000;
                    max = Math.max(0, max);
                    min += 5000;
                    min = Math.min(-1, min);
                }
                olderGrid = structuredClone(oldGrid);
                oldGrid = structuredClone(grid);

                // max = 0;
                // min = 0;

                // if (t < 270/freq) {
                // // if (true) {
                //     oldGrid[150][150] = Math.round(Math.cos(t*freq/180*Math.PI) * mag);
                // } else {
                //     oldGrid[150][150] = 0;
                // }
                // console.log(Math.round(Math.cos(t*freq/180*Math.PI) * mag));
                // oldGrid[350][350] = -Math.round(Math.cos(t*freq/180*Math.PI) * mag);

                for (let y=100; y<400; y++) {
                    oldGrid[y][0] = Math.round(Math.cos(t*freq/180*Math.PI) * mag)
                }

                // for (let x = 10; x <= 90; x++) {
                //     oldGrid[100-x][x] = Math.round(Math.cos(t*freq/180*Math.PI) * mag);
                // }
                // for (let x = 10; x <= 91; x++) {
                //     oldGrid[101-x][x] = Math.round(Math.cos(t*freq/180*Math.PI) * mag);
                // }

                for (let y=0; y<ch; y++) {
                    // if (isWall(100, y)) {
                    //     oldGrid[y][100] = 0;
                    // }
                    if (isWall(slitX, y)) {
                        oldGrid[y][slitX] = 0;
                    }
                }

                for (let x=1; x<cw-1; x++) {
                    for (let y=1; y<ch-1; y++) {
                        if (!fixed.includes(`${x}-${y}`) && !isWall(x, y) && isUpdate(x, y)) {
                            updateCell(x, y);
                        } else {
                            // if (grid[y][x] > max) max = grid[y][x];
                            // if (grid[y][x] < min) min = grid[y][x];
                        }
                    }
                }

                if (useMur) {
                    updateLeft();
                    updateRight();
                    updateTop();
                    updateBottom();
                }

                render();

                // frame();
            }

            function setColor(x, mult) {
                if (x > 100) {
                    ctx.fillStyle = `rgb(${Math.round(x/max * 255)}, 0, 0)`
                } else if (x < -100) {
                    ctx.fillStyle = `rgb(0, 0, ${Math.round(x/min * 255)})`
                } else {
                    ctx.fillStyle = 'black';
                }
            }

            let thresh = 1;

            let screen = [];
            // for (let y=0; y<ch; y++) screen.push(0);

            let screenStarted = false;
            let first;
            let screenX = 480;

            cvs.addEventListener('mousedown', e=>{
                screenStarted = true;
                first = t-1;

                screen = [];

                for (let y=0; y<ch; y++) screen.push(0);
            })

            function render() {
                grid.forEach((y, yi) => {
                    y.forEach((x, xi) => {
                        if (isWall(xi, yi)) {
                            ctx.fillStyle = 'green';
                        } else {
                            setColor(x, 10);
                        }

                        // if (x > thresh) ctx.fillStyle = 'red';
                        // else if (x < thresh) ctx.fillStyle = 'blue';
                        // else {ctx.fillStyle = 'black'};

                        ctx.fillRect(xi, yi, 1, 1);
                    })
                })

                // if (!screenStarted && Math.abs(grid[150][screenX]) > mag/1000) {
                //     screenStarted = true;
                //     first = t-1;
                // }

                if (screenStarted) {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(500, 0, 500, ch);

                    for (let y=0; y<ch; y++) {
                        screen[y] += (Math.abs(grid[y][screenX]) - screen[y])/(t-first);

                        setColor(screen[y], 50);

                        // ctx.clearRect(500, 0, 200, ch);

                        ctx.fillRect(520, y, screen[y]/max * 150, 1);
                    }
                }

                ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';

                ctx.beginPath();
                ctx.arc(250, 250, 150, Math.PI/2, 3*Math.PI/2, false);
                // ctx.arc(250, 250, 150, 0, 2*Math.PI, true);
                ctx.moveTo(250, 400);
                ctx.lineTo(250, 100);
                ctx.stroke();


                // ctx.beginPath();
                // ctx.moveTo(150, 0);
                // ctx.lineTo(150, ch);
                // ctx.stroke()
                // ctx.closePath();

                // ctx.beginPath();
                // ctx.moveTo(350, 0);
                // ctx.lineTo(350, ch);
                // ctx.stroke()
                // ctx.closePath();

                // ctx.fillStyle = 'green';
                // ctx.fillText('n = 2', 160, 350);
                // ctx.fillText('θr ~ 20°', 160, 370);
                // ctx.fillText('θi = 45°', 160, 390);
                // ctx.fillText('n = 1', 10, 350);
                // ctx.fillText('n = 1', 360, 350);


                if (showProtractor) {
                    for (let a = -90; a <= 90; a++) {
                        if (a % 10 == 0) {
                            ctx.beginPath();
                            ctx.moveTo(slitX, 200);
                            ctx.lineTo(slitX + (300 - slitX) * Math.cos((a-90)/180*Math.PI), 200 + (300 - slitX) * Math.sin((a-90)/180*Math.PI));
                            ctx.strokeStyle = 'white';
                            ctx.stroke();
                            ctx.closePath();
                        } else if (a % 5 == 0) {
                            ctx.beginPath();
                            ctx.moveTo(slitX + (300 - slitX -30) * Math.cos((a-90)/180*Math.PI), 200 + (300 - slitX-30) * Math.sin((a-90)/180*Math.PI));
                            ctx.lineTo(slitX + (300 - slitX-25) * Math.cos((a-90)/180*Math.PI), 200 + (300 - slitX-25) * Math.sin((a-90)/180*Math.PI));
                            ctx.strokeStyle = 'white';
                            ctx.stroke();
                            ctx.closePath();
                        } else {
                            ctx.beginPath();
                            ctx.moveTo(slitX + (300 - slitX -30) * Math.cos((a-90)/180*Math.PI), 200 + (300 - slitX-30) * Math.sin((a-90)/180*Math.PI));
                            ctx.lineTo(slitX + (300 - slitX-28) * Math.cos((a-90)/180*Math.PI), 200 + (300 - slitX-28) * Math.sin((a-90)/180*Math.PI));
                            ctx.strokeStyle = 'white';
                            ctx.stroke();
                            ctx.closePath();
                        }
                    }
                }
            }

            let id = setInterval(frame);

            window.addEventListener('keydown', e=>{
                if (e.key == 'p') {
                    clearInterval(id);
                } else if (e.key == 'r') {
                    id = setInterval(frame)
                }
            })

            // frame();
        </script>
    </body>
</html>
